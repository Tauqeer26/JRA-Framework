<svg viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6b5fd1;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#f0b352;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <rect width="200" height="150" fill="url(#grad1)" rx="8"/>
  
  <!-- Title -->
  <text x="100" y="30" font-size="14" font-weight="600" text-anchor="middle" fill="#6b5fd1">
    Task Mapping
  </text>
  
  <!-- Task boxes -->
  <rect x="15" y="50" width="85" height="30" fill="#fbf8f2" stroke="#6b5fd1" stroke-width="1.5" rx="4"/>
  <text x="57.5" y="70" font-size="10" text-anchor="middle" fill="#1f2937" font-weight="500">
    Routine
  </text>
  
  <rect x="100" y="50" width="85" height="30" fill="#fbf8f2" stroke="#f0b352" stroke-width="1.5" rx="4"/>
  <text x="142.5" y="70" font-size="10" text-anchor="middle" fill="#1f2937" font-weight="500">
    Strategic
  </text>
  
  <!-- Arrow -->
  <path d="M 57.5 85 L 142.5 85" stroke="#6b5fd1" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#6b5fd1" />
    </marker>
  </defs>
  
  <!-- Risk levels -->
  <circle cx="30" cy="115" r="5" fill="#c0392b" opacity="0.7"/>
  <text x="40" y="120" font-size="9" fill="#1f2937">High Risk</text>
  
  <circle cx="30" cy="130" r="5" fill="#f0b352" opacity="0.7"/>
  <text x="40" y="135" font-size="9" fill="#1f2937">Medium Risk</text>
  
  <circle cx="105" cy="115" r="5" fill="#117a65" opacity="0.7"/>
  <text x="115" y="120" font-size="9" fill="#1f2937">Low Risk</text>
</svg>